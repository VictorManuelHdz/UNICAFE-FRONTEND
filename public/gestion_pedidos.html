<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Pedidos - Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col relative">
        <main class="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">

            <section class="bg-white rounded-lg shadow-sm p-6 md:p-8 max-w-6xl mx-auto border border-unicafe-border">

                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-unicafe-header-dark">Historial de Pedidos</h2>
                    <div class="flex gap-2">
                        <button onclick="abrirEscaner()"
                            class="bg-[#ccab4f] text-white px-4 py-2 rounded-md font-bold hover:bg-[#b5953e] transition-colors shadow-sm text-sm flex items-center gap-2">
                            📷 Escanear QR
                        </button>
                        <button onclick="cargarPedidos()"
                            class="bg-unicafe-botones text-white px-4 py-2 rounded-md font-bold hover:bg-[#21867a] transition-colors shadow-sm text-sm">
                            ↻
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr
                                class="bg-gray-50 text-stone-600 uppercase text-xs tracking-wider border-b border-gray-200">
                                <th class="p-4 text-center font-black">Folio</th>
                                <th class="p-4 text-left font-black">Cliente</th>
                                <th class="p-4 text-left font-black">Fecha y Hora</th>
                                <th class="p-4 text-center font-black">Estado</th>
                                <th class="p-4 text-right font-black">Total</th>
                                <th class="p-4 text-center font-black">Acciones</th>
                            </tr>
                        </thead>

                        <tbody id="tabla-pedidos-body" class="text-sm">
                            <tr>
                                <td colspan="6" class="p-8 text-center text-gray-500 font-bold animate-pulse">
                                    Cargando pedidos... ☕
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div id="modalEscaner"
            class="fixed inset-0 z-[10000] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                <div class="bg-unicafe-header-dark p-4 flex justify-between items-center text-white">
                    <h3 class="font-black text-lg">Escanear Ticket del Alumno</h3>
                    <button onclick="cerrarEscaner()"
                        class="text-white hover:text-gray-300 font-bold text-xl">&times;</button>
                </div>
                <div class="p-4 bg-gray-50">
                    <div id="lector-qr"
                        class="w-full rounded-lg overflow-hidden border-2 border-dashed border-gray-300"></div>
                </div>
            </div>
        </div>

        <div id="modalDetallePedido"
            class="fixed inset-0 z-[10000] bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 transition-all opacity-0">
            <div id="modalCaja"
                class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden relative transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">

                <div class="bg-unicafe-header-dark p-4 flex justify-between items-center text-white">
                    <h3 class="font-black text-lg">Ticket de Pedido #<span id="ticketFolio">0</span></h3>
                    <button onclick="cerrarModalPedido()"
                        class="text-white hover:text-gray-300 font-bold text-xl leading-none">&times;</button>
                </div>

                <div class="p-6 overflow-y-auto flex-1 bg-[#fdfbf7]">
                    <div class="grid grid-cols-2 gap-4 mb-6 text-sm border-b border-gray-200 pb-4">
                        <div>
                            <p class="text-gray-500 font-bold mb-1">Cliente:</p>
                            <p id="ticketCliente" class="font-bold text-gray-800 text-base"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-500 font-bold mb-1">Fecha:</p>
                            <p id="ticketFecha" class="font-bold text-gray-800"></p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 font-bold mb-1">Notas del cliente:</p>
                            <p id="ticketNotas"
                                class="text-gray-700 italic bg-white p-3 rounded border border-gray-200 min-h-[40px]">
                            </p>
                        </div>
                    </div>

                    <h4 class="font-black text-unicafe-header-dark mb-3 uppercase text-sm tracking-wider">Artículos:
                    </h4>

                    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 text-gray-600 border-b border-gray-200">
                                <tr>
                                    <th class="p-3 text-center w-16">Cant.</th>
                                    <th class="p-3 text-left">Descripción</th>
                                    <th class="p-3 text-right">Precio</th>
                                    <th class="p-3 text-right">Importe</th>
                                </tr>
                            </thead>
                            <tbody id="ticketArticulos">
                            </tbody>
                            <tfoot class="bg-gray-50 border-t border-gray-200">
                                <tr>
                                    <td colspan="3" class="p-3 text-right font-black text-gray-700 text-base">TOTAL:
                                    </td>
                                    <td id="ticketTotal" class="p-3 text-right font-black text-unicafe-botones text-lg">
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="footer-dynamic"></div>
    <footer-component></footer-component>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
    <script src="./js/seguridad_frontend.js"></script>
    <script src="./js/gestion_pedidos.js"></script>
    <script src="../public/js/proteccionRutas.js"></script>
</body>

</html>
