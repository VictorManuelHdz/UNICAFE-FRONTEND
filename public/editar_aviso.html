<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aviso de Privacidad – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>

<body class="bg-unicafe-body text-[#1f1f1f] min-h-screen font-sans flex flex-col">
    <div class="flex flex-col flex-grow">
        <header-component></header-component>
        <nav-secundario></nav-secundario>

        <main class="flex-grow p-6 max-w-5xl mx-auto w-full mt-4">
            <div id="alerta" class="hidden mb-6 p-4 rounded-lg text-center font-semibold bg-green-100 text-green-700 border border-green-300">
                Aviso guardado correctamente.
            </div>

            <div class="bg-unicafe-form-bg border-2 border-unicafe-border rounded-md shadow-sm p-10 transition-all duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-bold text-unicafe-header-dark">Editar Aviso de Privacidad</h1>
                    <div class="font-bold">
                        <a href="javascript:history.back()" class="text-unicafe-cancel hover:underline">Cancelar</a>
                        <span class="text-gray-400 mx-1">/</span>
                        <a href="Aviso_de_privacidad.html" class="text-unicafe-cancel hover:underline">Volver</a>
                    </div>
                </div>

                <div class="h-px bg-gray-200 mb-8"></div>

                <form id="formAviso">
                    <textarea id="summernote" name="contenido"></textarea>

                    <div class="text-right mt-8">
                        <button type="submit" id="btnGuardarAviso"
                            class="bg-unicafe-botones text-white px-8 py-2 rounded-lg font-bold text-sm hover:brightness-95 transition-all shadow-md">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    </div> <div id="toast-container" class="fixed bottom-6 right-6 z-[10000]"></div>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/js/proteccionRutas.js"></script>
    <script type="module" src="./js/editar_aviso.js"></script>
</body>
</html>
