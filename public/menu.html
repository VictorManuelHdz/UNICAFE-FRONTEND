<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menú – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col">

        <main class="flex-1 p-4 md:p-8 w-full max-w-6xl mx-auto">
            <h1 class="text-center text-3xl font-bold mb-10 text-unicafe-header">Nuestro Menú del día</h1>

            <div id="menuPublicoContenedor" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 items-start">

                <p id="mensajeCarga" class="col-span-full text-center text-gray-500 font-bold text-lg animate-pulse">
                    Preparando el menú... ☕
                </p>

            </div>
        </main>
        <div id="modalDetalle"
            class="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 transition-all">

            <div id="modalCaja"
                class="bg-white rounded-xl shadow-2xl max-w-4xl w-full overflow-hidden relative border border-unicafe-border flex flex-col md:flex-row opacity-0 scale-95 transition-all duration-300">

                <button onclick="cerrarModal()"
                    class="absolute right-4 top-4 bg-gray-300 text-white hover:bg-unicafe-cancel w-8 h-8 rounded-full flex items-center justify-center text-xl font-bold z-10 transition-colors"
                    aria-label="Cerrar">&times;</button>

                <div id="modalImagenContenedor"
                    class="w-full md:w-1/2 flex items-center justify-center p-4 bg-[#fdfbf7] min-h-[250px]">
                </div>

                <div class="p-8 md:p-10 flex flex-col justify-center w-full md:w-1/2 bg-white">
                    <span id="modalCategoria"
                        class="text-unicafe-accent font-bold text-[12px] uppercase tracking-wider mb-2 block"></span>
                    <h2 id="modalNombre"
                        class="text-3xl font-black text-unicafe-header-dark mb-4 uppercase leading-tight"></h2>

                    <div>
                        <span class="text-gray-500 text-sm font-bold block mb-1">Precio:</span>
                        <p id="modalPrecio" class="text-3xl font-black text-gray-800">$0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="footer-dynamic"></div>

    <footer-component></footer-component>

    <script src="../public/componenetes_js/carrito.js"></script>
    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
    <script type="module" src="../public/js/menu.js"></script>

</body>

</html>
