<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menú – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col">

        <main class="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">
            <h1 class="text-center text-3xl font-bold mb-10 text-unicafe-header">Nuestro Menú del día</h1>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto items-stretch">

                <section class="flex flex-col bg-white border-2 border-[#bfa88a] rounded-lg p-[14px] shadow-sm">
                    <h3 class="text-center text-xl font-bold mt-1 mb-3 text-[#765433]">Bebidas Calientes</h3>

                    <div class="flex flex-col gap-3 h-full">
                        <article
                            class="border-2 border-[#a8d6c8] rounded-[10px] p-3 bg-white shadow-sm flex items-center gap-3">
                            <div
                                class="w-[60px] h-[60px] shrink-0 bg-[#eee] rounded-md overflow-hidden border border-[#d4d4d4]">
                                <img src="assets/cafe.jpg" alt="Café" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1 min-w-0">
                                <strong class="text-sm block truncate text-[#333]">Café Americano</strong>
                                <span
                                    class="inline-block mt-1 px-2 py-0.5 rounded border border-[#cfdad6] font-bold text-[13px] text-[#333]">$35.00</span>
                            </div>
                            <button onclick="verDetalle('cafe-ame')"
                                class="shrink-0 px-4 py-5 rounded-md text-[10px] font-black bg-[#ffb347] text-[#603813] uppercase hover:bg-[#ff9c12] transition-all shadow-sm leading-tight">
                                VER<br>DETALLE
                            </button>
                        </article>

                        <article
                            class="border-2 border-[#a8d6c8] rounded-[10px] p-3 bg-white shadow-sm flex items-center gap-3">
                            <div
                                class="w-[60px] h-[60px] shrink-0 rounded-md overflow-hidden border border-[#d4d4d4] bg-[#efe3cf] text-[#8a633b] font-bold text-xl flex items-center justify-center">
                                C
                            </div>
                            <div class="flex-1 min-w-0">
                                <strong class="text-sm block truncate text-[#333]">Capuchino Vainilla</strong>
                                <span
                                    class="inline-block mt-1 px-2 py-0.5 rounded border border-[#cfdad6] font-bold text-[13px] text-[#333]">$45.00</span>
                            </div>
                            <button onclick="verDetalle('capu-vai')"
                                class="shrink-0 px-4 py-5 rounded-md text-[10px] font-black bg-[#ffb347] text-[#603813] uppercase hover:bg-[#ff9c12] transition-all shadow-sm leading-tight">
                                VER<br>DETALLE
                            </button>
                        </article>
                    </div>
                </section>

                <section class="flex flex-col bg-white border-2 border-[#bfa88a] rounded-lg p-[14px] shadow-sm">
                    <h3 class="text-center text-xl font-bold mt-1 mb-3 text-[#765433]">Snacks</h3>

                    <div class="flex flex-col gap-3 h-full">
                        <article
                            class="border-2 border-[#a8d6c8] rounded-[10px] p-3 bg-white shadow-sm flex items-center gap-3">
                            <div
                                class="w-[60px] h-[60px] shrink-0 bg-[#eee] rounded-md overflow-hidden border border-[#d4d4d4]">
                                <img src="assets/coca.jpg" alt="Coca" class="w-full h-full object-contain p-1">
                            </div>
                            <div class="flex-1 min-w-0">
                                <strong class="text-sm block truncate text-[#333]">Coca-Cola 600ml</strong>
                                <span
                                    class="inline-block mt-1 px-2 py-0.5 rounded border border-[#cfdad6] font-bold text-[13px] text-[#333]">$23.00</span>
                            </div>
                            <button onclick="verDetalle('coca-600')"
                                class="shrink-0 px-4 py-5 rounded-md text-[10px] font-black bg-[#ffb347] text-[#603813] uppercase hover:bg-[#ff9c12] transition-all shadow-sm leading-tight">
                                VER<br>DETALLE
                            </button>
                        </article>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="footer-dynamic"></div>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-dynamic').innerHTML = html;
                // Cargar scripts de lógica después
                ['archivosJS/lector_voz.js', 'archivosJS/accesibilidad.js'].forEach(src => {
                    const s = document.createElement('script');
                    s.src = src;
                    document.body.appendChild(s);
                });
            });
    </script>

    <script src="/public/componenetes js/componentes.js"></script>
</body>

</html>
