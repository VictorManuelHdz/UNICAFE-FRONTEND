<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Somos Unicafe – Cafetería UTHH</title>

    <link rel="stylesheet" href="css/output.css">
</head>

<body class="bg-unicafe-body text-[#1f1f1f] min-h-screen font-sans flex flex-col">

    <div class="app flex flex-col flex-grow">
        
        <header-component></header-component>
        <nav-secundario></nav-secundario>

        <main class="flex-grow p-6 max-w-5xl mx-auto w-full mt-4">

            <div class="bg-white border-2 border-unicafe-border rounded-md shadow-sm p-10 transition-all duration-300">

                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold text-unicafe-header">
                        Somos Unicafe
                    </h1>
                </div>

                <div class="flex flex-col md:flex-row gap-10 items-start">

                    <div class="w-full md:w-1/2">
                        <img
                            src="imagenes/unicafe1.jpg"
                            alt="Instalaciones Unicafe"
                            class="w-full rounded-xl shadow-md border border-gray-200"
                        >
                    </div>

                    <div class="w-full md:w-1/2 space-y-6">

                        <p class="text-lg leading-snug">
                            Somos el corazón de tu escuela, ahora en tu bolsillo
                        </p>

                        <p class="text-lg leading-relaxed text-gray-700">
                            En la cafetería escolar, creemos que la alimentación es fundamental
                            para el aprendizaje y el bienestar. Por eso, nos esforzamos por
                            ofrecer opciones saludables, deliciosas y asequibles a toda la
                            comunidad educativa.
                        </p>

                    </div>

                </div>

            </div>

        </main>

    </div>

    <div id="footer-dynamic"></div>

    <script>
        fetch('/public/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-dynamic').innerHTML = html;

                [
                    'archivosJS/lector_voz.js',
                    'archivosJS/accesibilidad.js'
                ].forEach(src => {
                    const s = document.createElement('script');
                    s.src = src;
                    document.body.appendChild(s);
                });
            });
    </script>
<script src="../public/componenetes_js/componentes.js"></script>
</body>

</html>
