<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Menú – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <div class="app flex-1 flex flex-col">
        <header-component></header-component>
        <nav-secundario></nav-secundario>

        <main class="flex-1 p-4 md:p-8 w-full max-w-6xl mx-auto">
            <button id="btnMostrarFormulario"
                class="bg-unicafe-accent hover:bg-unicafe-accent-hover text-white py-2 px-6 rounded-md font-bold cursor-pointer block mx-auto my-5 w-max transition-colors shadow-unicafe">
                Agregar Platillo
            </button>

            <div id="formularioPlatillo" class="hidden">
                <form id="formPlatillo" autocomplete="off"
                    class="max-w-[800px] w-full mx-auto my-[15px] p-[30px] bg-unicafe-form-bg rounded-[10px] border border-unicafe-border shadow-unicafe">
                    <h2 class="text-xl font-bold text-center text-[#1f1f1f] mt-0 mb-6" id="tituloFormulario">Agregar
                        nuevo platillo</h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block mb-1.5 font-bold text-[14px] text-[#333]">Categoría</label>
                            <select id="categoriaPlatillo" required
                                class="w-full p-2.5 rounded-[5px] border border-unicafe-border bg-white focus:outline-none focus:border-unicafe-botones">
                                <option value="">Cargando categorías...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block mb-1.5 font-bold text-[14px] text-[#333]">Nombre del platillo</label>
                            <input type="text" id="nombrePlatillo" placeholder="Ej. Torta de milanesa" required
                                class="w-full p-2.5 rounded-[5px] border border-unicafe-border bg-white focus:outline-none focus:border-unicafe-botones">
                        </div>
                        <div>
                            <label class="block mb-1.5 font-bold text-[14px] text-[#333]">Precio ($ MXN)</label>
                            <input type="number" id="precioPlatillo" step="0.50" min="0" placeholder="Ej. 40.00"
                                required
                                class="w-full p-2.5 rounded-[5px] border border-unicafe-border bg-white focus:outline-none focus:border-unicafe-botones">
                        </div>

                        <div class="md:col-span-2">
                            <label
                                class="block mb-1.5 font-bold text-[14px] text-[#333] text-center md:text-left">Imagen
                                del Platillo</label>

                            <div
                                class="flex flex-col items-center gap-4 mt-1 border border-unicafe-border p-6 rounded-[5px] bg-white shadow-sm">

                                <div id="contenedorPrevia"
                                    class="w-[180px] h-[180px] rounded-[10px] border-2 border-dashed border-[#ccc] bg-[#f9f9f9] flex items-center justify-center overflow-hidden flex-shrink-0 shadow-inner">
                                    <img id="imgPrevia" src="" alt="Vista previa"
                                        class="hidden w-full h-full object-cover">
                                    <span id="placeholderPrevia" class="text-gray-400 text-5xl opacity-70">🖼️</span>
                                </div>

                                <div class="flex flex-col gap-2 items-center w-full">
                                    <input type="file" id="imagenPlatillo" accept="image/*" class="hidden">
                                    <span id="textoNombreArchivo"
                                        class="text-gray-500 text-sm italic truncate max-w-[250px] text-center">Ninguna
                                        imagen seleccionada</span>
                                    <label for="imagenPlatillo"
                                        class="cursor-pointer bg-[#eef7f1] border-2 border-[#a7d4bf] text-[#0e3a23] hover:bg-[#a7d4bf] hover:text-white py-2 px-6 rounded-[5px] font-bold transition-colors shadow-sm text-center">
                                        📁 Elegir imagen
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-[#e4e4e4]">
                        <button type="button" onclick="toggleFormulario()"
                            class="bg-unicafe-cancel hover:bg-red-600 text-white py-2.5 px-6 rounded-[5px] font-semibold transition-colors">Cancelar</button>
                        <button type="submit" id="btnSubmitPlatillo"
                            class="bg-unicafe-botones hover:bg-[#21867a] text-white py-2.5 px-6 rounded-[5px] font-semibold transition-colors">Guardar
                            platillo</button>
                    </div>
                </form>
            </div>

            <section id="estadisticasMenu"
                class="bg-unicafe-form-bg p-[20px] rounded-[10px] border border-unicafe-border shadow-unicafe mb-10 hidden">
                <h2 class="text-unicafe-header-dark text-[1.2rem] font-bold text-center mb-4">📊 Distribución del Menú
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <div id="listadoProductos">
                <h2 class="text-center text-[28px] font-bold mb-8 text-[#1f1f1f]">Gestión del Menú del día</h2>

                <div id="contenedorColumnas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 items-start">
                </div>
            </div>
        </main>
    </div>

    <div id="modal-confirmacion" class="fixed inset-0 z-10000 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full text-center transform scale-95 transition-transform duration-300" id="modal-confirmacion-caja">
            <div class="text-unicafe-cancel text-5xl mb-4">⚠️</div>
            <h3 class="text-2xl font-black text-gray-800 mb-2">¿Estás seguro?</h3>
            <p class="text-gray-500 mb-8 text-sm" id="modal-confirmacion-mensaje">Esta acción no se puede deshacer.</p>
            <div class="flex gap-3 justify-center">
                <button id="btn-cancelar-accion" class="px-5 py-2.5 rounded-lg bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors w-full">Cancelar</button>
                <button id="btn-confirmar-accion" class="px-5 py-2.5 rounded-lg bg-unicafe-cancel text-white font-bold hover:brightness-110 transition-colors shadow-sm w-full">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/js/proteccionRutas.js"></script>
    <script type="module" src="./js/gestion_menu.js"></script>
</body>

</html>
