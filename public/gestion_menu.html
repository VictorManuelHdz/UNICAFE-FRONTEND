<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Menú – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>
<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <div class="app flex-1 flex flex-col">
    <header-component></header-component>
    <nav-secundario></nav-secundario>

        <main class="flex-1 p-4 md:p-8 w-full max-w-[1400px] mx-auto">

            <button id="btnMostrarFormulario" class="bg-unicafe-accent hover:bg-unicafe-accent-hover text-white py-2 px-6 rounded-md font-bold cursor-pointer block mx-auto my-5 w-max transition-colors shadow-unicafe">
                Agregar Platillo
            </button>

            <div id="formularioPlatillo" class="hidden">
                <form action="#" method="post" enctype="multipart/form-data" class="max-w-[600px] mx-auto my-[15px] p-[20px] bg-unicafe-form-bg rounded-[10px] border border-unicafe-border shadow-unicafe">
                    <h2 class="text-xl font-bold text-center text-[#1f1f1f] mt-0 mb-4">Agregar nuevo platillo</h2>
                    <div class="flex flex-col gap-3">
                        <div>
                            <label class="block mb-1 font-bold text-[14px] text-[#333]">Categoría</label>
                            <input type="text" placeholder="Guisados, Tacos, Tortas..." required class="w-full p-2 rounded-[5px] border border-unicafe-border bg-white">
                        </div>
                        <div>
                            <label class="block mb-1 font-bold text-[14px] text-[#333]">Nombre del platillo</label>
                            <input type="text" placeholder="Ej. Torta de milanesa" required class="w-full p-2 rounded-[5px] border border-unicafe-border bg-white">
                        </div>
                        <div>
                            <label class="block mb-1 font-bold text-[14px] text-[#333]">Precio</label>
                            <input type="number" step="0.01" placeholder="Ej. 40" required class="w-full p-2 rounded-[5px] border border-unicafe-border bg-white">
                        </div>
                        <div>
                            <label class="block mb-1 font-bold text-[14px] text-[#333]">Imagen del Platillo</label>
                            <input type="file" accept="image/*" class="w-full p-2 text-[14px]">
                        </div>
                        <div class="flex gap-2 mt-2">
                            <button type="submit" class="bg-unicafe-botones hover:opacity-90 text-white py-2 px-4 rounded-[5px] font-semibold transition-opacity w-max">Agregar platillo</button>
                            <button type="button" onclick="toggleFormulario()" class="bg-unicafe-cancel hover:opacity-90 text-white py-2 px-4 rounded-[5px] font-semibold transition-opacity inline-block">Cancelar</button>
                        </div>
                    </div>
                </form>
            </div>

            <section id="estadisticasMenu" class="max-w-[1000px] mx-auto bg-unicafe-form-bg p-[15px] rounded-[10px] border border-unicafe-border shadow-unicafe mb-8">
                <h2 class="text-unicafe-header-dark text-[1.2rem] font-bold text-center m-0">📊 Estadísticas de Distribución por Categoría</h2>
                <div class="flex flex-wrap justify-center gap-[20px] mt-[15px]">
                    <div class="bg-unicafe-botones text-white px-[20px] py-[10px] rounded-[15px] font-bold shadow-unicafe flex items-center">
                        Enchiladas: <span class="bg-white text-unicafe-botones px-[8px] py-[2px] rounded-full ml-[5px] text-sm">2</span>
                    </div>
                </div>
            </section>

            <div id="listadoProductos" class="block">
                <h2 class="text-center text-[28px] font-bold mb-8 text-[#1f1f1f]">Nuestro Menú del día</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-[20px] w-full items-start">
                    
                    <section class="w-full bg-white border-2 border-unicafe-border rounded-[8px] p-[14px] shadow-unicafe">
                        <h3 class="text-center text-[20px] font-bold mt-1 mb-3 text-[#1f1f1f]">Enchiladas</h3>
                        
                        <article class="w-full border-2 border-unicafe-card-border rounded-[10px] p-[12px_14px] bg-white shadow-unicafe flex flex-col">
                            <div class="flex items-center gap-[12px] py-[8px] border-b border-[#e4e4e4] mb-[8px]">
                                
                                <div class="w-[50px] h-[50px] shrink-0 bg-unicafe-body text-unicafe-avatar-text text-xl font-bold rounded-[5px] flex items-center justify-center border border-unicafe-avatar-border">M</div>
                                
                                <div class="flex-1 flex flex-col gap-1 items-center">
                                    <strong class="text-[14px] leading-tight text-[#1f1f1f]">Mixtas</strong>
                                    <span class="inline-block px-[8px] py-[3px] rounded-[8px] bg-white border border-unicafe-price-border font-bold text-[13px] text-[#333]">$50.00</span>
                                </div>
                                
                                <div class="flex flex-col gap-[4px] w-[65px] shrink-0">
                                    <button class="bg-unicafe-btn-ver text-unicafe-text-ver font-bold uppercase text-[9px] py-[4px] px-[2px] rounded-[4px] text-center w-full leading-tight hover:opacity-90 transition-opacity">VER<br>DETALLE</button>
                                    <button class="bg-unicafe-btn-editar text-white font-bold text-[11px] py-[4px] rounded-[4px] text-center w-full hover:opacity-90 transition-opacity">Editar</button>
                                    <button class="bg-unicafe-btn-eliminar text-white font-bold text-[11px] py-[4px] rounded-[4px] text-center w-full hover:opacity-90 transition-opacity">Eliminar</button>
                                </div>
                            </div>
                        </article>
                        
                    </section>
                    
                </div>
            </div>
        </main>
    </div>

    <script>
        const btnFormulario = document.getElementById('btnMostrarFormulario');
        const formContainer = document.getElementById('formularioPlatillo');
        const listContainer = document.getElementById('listadoProductos');
        const estadisticas = document.getElementById('estadisticasMenu');

        function toggleFormulario() {
            if (formContainer.classList.contains('hidden')) {
                formContainer.classList.remove('hidden');
                listContainer.classList.add('hidden');
                if(estadisticas) estadisticas.classList.add('hidden');
                btnFormulario.textContent = 'Ocultar Formulario';
            } else {
                formContainer.classList.add('hidden');
                listContainer.classList.remove('hidden');
                if(estadisticas) estadisticas.classList.remove('hidden');
                btnFormulario.textContent = 'Agregar Platillo';
            }
        }
        if (btnFormulario) btnFormulario.addEventListener('click', toggleFormulario);
    </script>
    <script src="../public/componenetes_js/componentes.js"></script>
</body>
</html>
