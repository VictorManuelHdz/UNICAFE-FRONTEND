<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cafetería UTHH – Acceso</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">
    <header> 
        <div class="w-full bg-unicafe-header text-white p-4 md:p-6 flex justify-center items-center shadow-md">
            <h1 class="m-0 text-xl md:text-3xl font-[800] tracking-wider uppercase">CAFETERIA UTHH</h1>
        </div>
    </header>
    <main class="flex-1 flex flex-col items-center justify-center p-6 relative overflow-hidden">

        <div class="relative flex flex-col items-center justify-center w-full max-w-[850px]">

            <svg class="w-full h-auto opacity-90 block drop-shadow-2xl" viewBox="0 0 600 380" aria-hidden="true">
                <path d="M180 70c30 40-30 40 0 80M300 70c30 40-30 40 0 80M420 70c30 40-30 40 0 80" fill="none"
                    stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" />
                <path d="M120 140h300c6 0 10 4 10 10v25c0 76-36 116-160 116s-160-40-160-116v-25c0-6 4-10 10-10z"
                    fill="none" stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M430 170c46 0 70 20 70 55s-24 55-70 55" fill="none" stroke="#6b5b4b" stroke-width="12"
                    stroke-linecap="round" />
                <path d="M110 320h300c16 0 16 20 0 20H230c-8 14-26 14-34 0H110c-16 0-16-20 0-20z" fill="none"
                    stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>

            <form action="#" method="post" class="md:absolute md:top-[58.5%] md:left-[46%] md:-translate-x-1/2 md:-translate-y-1/2 
                   grid gap-2.5 w-full max-w-[210px] text-center z-10
                   static mt-10 md:mt-0 bg-white/30 md:bg-transparent p-6 md:p-0 rounded-3xl">

                <input id="usuario" name="usuario" type="email" placeholder="CORREO" required
                    class="h-[38px] border-[1.5px] border-[#a7d4bf] rounded-[10px] bg-white px-4 font-bold text-center text-[13px] shadow-sm focus:outline-none focus:ring-4 focus:ring-[#4aa36c]/20 transition-all placeholder:text-[#6b6b6b] placeholder:font-bold">

                <input id="password" name="password" type="password" placeholder="CONTRASEÑA" required
                    class="h-[38px] border-[1.5px] border-[#a7d4bf] rounded-[10px] bg-white px-4 font-bold text-center text-[13px] shadow-sm focus:outline-none focus:ring-4 focus:ring-[#4aa36c]/20 transition-all placeholder:text-[#6b6b6b] placeholder:font-bold">

                <button type="submit"
                    class="h-[38px] bg-white text-[#0e3a23] border-[1.5px] border-[#a7d4bf] rounded-[10px] font-bold cursor-pointer transition-all hover:bg-[#eef7f1] hover:-translate-y-0.5 active:translate-y-0 shadow-md">
                    Entrar
                </button>

                <p class="text-center text-[0.85rem] mt-0.5">
                    <a href="mi_cuenta.html" class="text-[#6b5b4b] font-bold hover:underline drop-shadow-sm">
                        Crear una cuenta
                    </a>
                </p>
            </form>

        </div>
    </main>

    <div id="footer-dynamic"></div>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-dynamic').innerHTML = html;
                // Cargar scripts de lógica después
                ['archivosJS/lector_voz.js', 'archivosJS/accesibilidad.js'].forEach(src => {
                    const s = document.createElement('script');
                    s.src = src;
                    document.body.appendChild(s);
                });
            });
    </script>

</body>

</html>
