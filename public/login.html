<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cafetería UTHH – Acceso</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">
    <header>
        <div class="w-full bg-unicafe-header text-white p-4 md:p-6 flex justify-center items-center shadow-md">
            <h1 class="m-0 text-xl md:text-3xl font-[800] tracking-wider uppercase">CAFETERIA UTHH</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-6 relative overflow-hidden">

        <div class="relative flex flex-col items-center justify-center w-full max-w-[850px]">

            <div id="mensajeAlerta"
                class="hidden absolute -top-4 md:top-0 left-1/2 md:left-[46%] -translate-x-1/2 px-8 py-4 rounded-xl font-bold text-red-800 bg-red-100 border-2 border-red-200 text-center w-11/12 max-w-md shadow-md z-[50] text-base md:text-lg transition-all">
                Mensaje de error
            </div>

            <svg class="w-full max-w-[500px] md:max-w-none h-auto opacity-90 block drop-shadow-2xl mb-8 md:mb-0"
                viewBox="0 0 600 380" aria-hidden="true">
                <path d="M180 70c30 40-30 40 0 80M300 70c30 40-30 40 0 80M420 70c30 40-30 40 0 80" fill="none"
                    stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" />
                <path d="M120 140h300c6 0 10 4 10 10v25c0 76-36 116-160 116s-160-40-160-116v-25c0-6 4-10 10-10z"
                    fill="none" stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M430 170c46 0 70 20 70 55s-24 55-70 55" fill="none" stroke="#6b5b4b" stroke-width="12"
                    stroke-linecap="round" />
                <path d="M110 320h300c16 0 16 20 0 20H230c-8 14-26 14-34 0H110c-16 0-16-20 0-20z" fill="none"
                    stroke="#6b5b4b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>

            <form action="#" method="post" id="loginForm" class="
                static w-full max-w-[280px] bg-white/40 p-6 rounded-3xl z-10 grid gap-3 text-center
                md:absolute md:top-[58.5%] md:left-[46%] md:-translate-x-1/2 md:-translate-y-1/2 md:max-w-[210px] md:bg-transparent md:p-0 md:rounded-none
                ">

                <input id="usuario" name="usuario" type="email" placeholder="CORREO" required
                    class="h-[42px] md:h-[38px] w-full border-[1.5px] border-[#a7d4bf] rounded-[10px] bg-white px-4 font-bold text-center text-[14px] md:text-[13px] shadow-sm focus:outline-none focus:ring-4 focus:ring-[#4aa36c]/20 transition-all placeholder:text-[#6b6b6b] placeholder:font-bold">

                <input id="password" name="password" type="password" placeholder="CONTRASEÑA" required
                    class="h-[42px] md:h-[38px] w-full border-[1.5px] border-[#a7d4bf] rounded-[10px] bg-white px-4 font-bold text-center text-[14px] md:text-[13px] shadow-sm focus:outline-none focus:ring-4 focus:ring-[#4aa36c]/20 transition-all placeholder:text-[#6b6b6b] placeholder:font-bold">

                <button id="btnSubmit" type="submit"
                    class="h-[42px] md:h-[38px] w-full bg-white text-[#0e3a23] border-[1.5px] border-[#a7d4bf] rounded-[10px] font-bold cursor-pointer transition-all hover:bg-[#eef7f1] hover:-translate-y-0.5 active:translate-y-0 shadow-md flex justify-center items-center gap-2">
                    Entrar
                </button>

                <p class="text-center text-[0.9rem] md:text-[0.85rem] mt-1 md:mt-0.5">
                    <a href="registro.html" class="text-[#6b5b4b] font-bold hover:underline drop-shadow-sm">
                        Crear una cuenta
                    </a>
                </p>
            </form>

        </div>
    </main>

    <div id="footer-dynamic"></div>

    <footer-component></footer-component>

    <script src="../public/js/login.js"></script>
    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
</body>

</html>
