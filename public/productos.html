<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Productos – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
    <style>
        /* Efecto Hover para la imagen del producto */
        .img-container {
            position: relative;
            overflow: hidden;
        }

        /* Overlay que aparece al pasar el mouse */
        .hover-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            font-weight: bold;
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }

        .img-container:hover .hover-overlay {
            opacity: 1;
        }
    </style>
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col">
        <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
            <h1 class="text-center text-3xl font-bold mb-2 text-unicafe-header uppercase">Nuestros Productos</h1>
            <p class="text-center mb-10 text-gray-600 text-sm italic">Pasa el cursor sobre la imagen para ver detalles</p>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <article class="bg-white border-2 border-[#bfa88a] rounded-xl p-4 flex items-center gap-4 shadow-sm">
                    <div class="img-container w-24 h-20 bg-[#eee] rounded-md border border-gray-300 shrink-0 cursor-pointer"
                         onclick="abrirModal('Coca-Cola', 'Refresco de cola de 600 ml', '23.00', '15', 'assets/coca.jpg')">
                        <img src="assets/coca.jpg" alt="Coca-Cola" class="w-full h-full object-contain p-1">
                        <div class="hover-overlay">
                            <span class="text-lg">🔍</span>
                            <span>VER<br>DETALLE</span>
                        </div>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Coca-Cola 600ml</h3>
                        <div class="mt-1 inline-block px-3 py-1 rounded border border-gray-200 bg-white font-black text-sm text-[#765433]">
                            $23.00
                        </div>
                    </div>
                </article>

                <article class="bg-white border-2 border-[#bfa88a] rounded-xl p-4 flex items-center gap-4 shadow-sm">
                    <div class="img-container w-24 h-20 bg-[#eee] rounded-md border border-gray-300 shrink-0 cursor-pointer"
                         onclick="abrirModal('CHETOS', 'chetos con sal paquete de 800g.', '20.00', '20', 'assets/chetos.jpg')">
                        <img src="assets/chetos.jpg" alt="Chetos" class="w-full h-full object-cover">
                        <div class="hover-overlay">
                            <span class="text-lg">🔍</span>
                            <span>VER<br>DETALLE</span>
                        </div>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Chetos Gustosines</h3>
                        <div class="mt-1 inline-block px-3 py-1 rounded border border-gray-200 bg-white font-black text-sm text-[#765433]">
                            $20.00
                        </div>
                    </div>
                </article>

            </div>
        </main>

        <div id="productModal" 
            class="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 transition-all"
            role="dialog" aria-modal="true">
            
            <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full overflow-hidden relative border border-[#bfa88a] flex flex-col md:flex-row animate-in fade-in zoom-in duration-200">
                
                <button onclick="cerrarModal()" 
                    class="absolute right-4 top-4 bg-gray-300 text-white hover:bg-gray-400 w-8 h-8 rounded-full flex items-center justify-center text-xl font-bold z-10"
                    aria-label="Cerrar">&times;</button>

                <div class="w-full md:w-1/2 flex items-center justify-center p-2">
                    <img id="modalImg" src="" alt="Producto" class="max-w-full max-h-[400px] object-contain">
                </div>
                
                <div class="p-10 flex flex-col justify-center w-full md:w-1/2 bg-white">
                    <h2 id="modalTitle" class="text-3xl font-black text-[#765433] mb-4 uppercase"></h2>
                    <p id="modalStock" class="text-gray-500 text-sm mb-6"></p>
                    <p id="modalDesc" class="text-gray-600 mb-10 text-lg leading-snug"></p>
                    
                    <div class="flex items-center justify-between">
                        <div id="modalPrice" class="text-4xl font-black text-[#2a9d8f]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-dynamic"></div>

    <script>
        const modal = document.getElementById("productModal");

        function abrirModal(nombre, descripcion, precio, stock, imgUrl) {
            document.getElementById("modalTitle").innerText = nombre;
            document.getElementById("modalDesc").innerText = descripcion;
            document.getElementById("modalPrice").innerText = "$" + parseFloat(precio).toFixed(2) + " MXN";
            document.getElementById("modalStock").innerText = "Disponibles: " + stock + " unidades";
            document.getElementById("modalImg").src = imgUrl;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = "hidden";
        }

        function cerrarModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = "auto";
        }

        window.onclick = (e) => { if (e.target == modal) cerrarModal(); };

        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-dynamic').innerHTML = html;
                ['archivosJS/lector_voz.js', 'archivosJS/accesibilidad.js'].forEach(src => {
                    const s = document.createElement('script');
                    s.src = src;
                    document.body.appendChild(s);
                });
            });
    </script>
    <script src="/public/componenetes js/componentes.js"></script>
</body>
</html>
