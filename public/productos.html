<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Productos – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col">
        <main class="flex-1 p-6 max-w-[1400px] mx-auto w-full">
            <h2 class="text-center text-[22px] font-bold mt-4 mb-3 text-[#1f1f1f]">Nuestros Productos</h2>
            <p class="text-center mb-8 text-[#666] text-[14px]">Haz clic en la imagen para ver detalles.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4" id="contenedor-productos">
            </div>
        </main>

        <div id="productModal"
            class="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 transition-all"
            role="dialog" aria-modal="true">

            <div
                class="bg-white rounded-xl shadow-2xl max-w-4xl w-full overflow-hidden relative border border-unicafe-border flex flex-col md:flex-row animate-in fade-in zoom-in duration-200">

                <button onclick="cerrarModal()"
                    class="absolute right-4 top-4 bg-gray-300 text-white hover:bg-unicafe-cancel w-8 h-8 rounded-full flex items-center justify-center text-xl font-bold z-10 transition-colors"
                    aria-label="Cerrar">&times;</button>

                <div class="w-full md:w-1/2 flex items-center justify-center p-2">
                    <img id="modalImg" src="" alt="Producto" class="max-w-full max-h-[400px] object-contain">
                </div>

                <div class="p-10 flex flex-col justify-center w-full md:w-1/2 bg-white">
                    <h2 id="modalTitle" class="text-3xl font-black text-unicafe-header-dark mb-4 uppercase"></h2>
                    <p id="modalStock" class="text-gray-500 text-sm mb-6"></p>
                    <p id="modalDesc" class="text-gray-600 mb-10 text-lg leading-snug"></p>

                    <div class="flex items-center justify-between">
                        <div id="modalPrice" class="text-4xl font-black text-unicafe-botones"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-dynamic"></div>

    <footer-component></footer-component>
    
    <script src="../public/componenetes_js/componentes.js"></script>
    <script type="module" src="js/productos.js"></script>
</body>

</html>
