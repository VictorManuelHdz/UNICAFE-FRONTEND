<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Productos – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col">
        <main class="flex-1 w-full px-3 md:px-6 py-6 flex flex-col md:flex-row gap-6">

            <aside id="sidebar-categorias" class="w-full md:w-64 shrink-0 transition-all duration-300">
                <div class="bg-white border border-unicafe-border rounded-xl p-5 shadow-sm sticky top-6">
                    <h3
                        class="font-black text-lg text-unicafe-header-dark mb-4 uppercase border-b border-unicafe-border/50 pb-2">
                        Categorías
                    </h3>

                    <ul id="contenedor-categorias" class="space-y-2" onchange="filtrarPorCategoria(this.value, this.options[this.selectedIndex].text)">
                        
                    </ul>
                </div>
            </aside>

            <section class="flex-1 min-w-0">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">

                    <div class="flex flex-col md:flex-row items-center justify-between w-full mb-8 gap-4">

                        <div class="w-full md:w-1/3 flex justify-start order-1 md:order-none">
                            <button id="btn-toggle-sidebar"
                                class="bg-unicafe-botones text-white w-10 h-10 rounded-lg shadow-sm hover:bg-[#238b7f] transition-colors flex items-center justify-center shrink-0"
                                aria-label="Ocultar/Mostrar filtros">
                                <span class="text-xl leading-none">☰</span>
                            </button>
                        </div>

                        <div
                            class="w-full md:w-1/3 text-center order-2 md:order-none flex flex-col items-center justify-center">
                            <h2 class="text-[22px] font-bold text-[#1f1f1f] leading-tight m-0">Nuestros Productos</h2>
                            <p class="text-[#666] text-[14px] mt-1 m-0">Haz clic en la imagen para ver detalles.</p>
                        </div>

                        <div
                            class="w-full md:w-1/3 flex justify-start md:justify-end order-3 md:order-none mt-2 md:mt-0">
                            <div id="texto-mostrando-productos"
                                class="text-sm font-bold text-unicafe-header-dark bg-white border border-unicafe-border px-3 py-1 rounded-full shadow-sm inline-block">
                                Mostrando todos los productos
                            </div>
                        </div>

                    </div>

                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-x-6 gap-y-4" id="contenedor-productos">
                </div>
            </section>
        </main>

        <div id="productModal"
            class="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 transition-all"
            role="dialog" aria-modal="true">

            <div
                class="bg-white rounded-xl shadow-2xl max-w-4xl w-full overflow-hidden relative border border-unicafe-border flex flex-col md:flex-row animate-in fade-in zoom-in duration-200">

                <button onclick="cerrarModal()"
                    class="absolute right-4 top-4 bg-gray-300 text-white hover:bg-unicafe-cancel w-8 h-8 rounded-full flex items-center justify-center text-xl font-bold z-10 transition-colors"
                    aria-label="Cerrar">&times;</button>

                <div class="w-full md:w-1/2 flex items-center justify-center p-2">
                    <img id="modalImg" src="" alt="Producto" class="max-w-full max-h-[400px] object-contain">
                </div>

                <div class="p-10 flex flex-col justify-center w-full md:w-1/2 bg-white">
                    <h2 id="modalTitle" class="text-3xl font-black text-unicafe-header-dark mb-4 uppercase"></h2>
                    <p id="modalStock" class="text-gray-500 text-sm mb-6"></p>
                    <p id="modalDesc" class="text-gray-600 mb-10 text-lg leading-snug"></p>

                    <div class="flex items-center justify-between">
                        <div id="modalPrice" class="text-4xl font-black text-unicafe-botones"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-dynamic"></div>

    <footer-component></footer-component>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
    <script type="module" src="js/productos.js"></script>
</body>

</html>
