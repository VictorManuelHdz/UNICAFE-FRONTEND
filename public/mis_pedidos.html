<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Pedidos - Cafetería UTHH</title> 
    <link rel="stylesheet" href="css/output.css" />
</head>
<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <div class="app flex-1 flex flex-col relative">
        <main class="flex-1 p-4 md:p-8 w-full max-w-5xl mx-auto">

            <div class="mb-8 text-center md:text-left">
                <h2 class="text-3xl font-black text-unicafe-header-dark">Mis Pedidos</h2>
                <p class="text-gray-500 mt-1">Muestra tu Código QR en ventanilla para recoger tu comida.</p>
            </div>

            <div id="contenedorMisPedidos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-500 font-bold animate-pulse col-span-full text-center py-10">Buscando tus pedidos... ☕</p>
            </div>

        </main>
    </div>
    
    <div id="modalDetallePedido"
        class="fixed inset-0 z-[10000] bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 transition-all opacity-0">
        <div id="modalCaja"
            class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden relative transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">
            
            <div class="bg-unicafe-header-dark p-4 flex justify-between items-center text-white">
                <h3 class="font-black text-lg">Ticket de Pedido #<span id="ticketFolio">0</span></h3>
                <button onclick="cerrarModalPedido()"
                    class="text-white hover:text-gray-300 font-bold text-xl leading-none">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-[#fdfbf7]">
                <h4 class="font-black text-unicafe-header-dark mb-3 uppercase text-sm tracking-wider">Artículos:</h4>
                <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 text-gray-600 border-b border-gray-200">
                            <tr>
                                <th class="p-3 text-center w-16">Cant.</th>
                                <th class="p-3 text-left">Descripción</th>
                                <th class="p-3 text-right">Importe</th>
                            </tr>
                        </thead>
                        <tbody id="ticketArticulos">
                            </tbody>
                        <tfoot class="bg-gray-50 border-t border-gray-200">
                            <tr>
                                <td colspan="2" class="p-3 text-right font-black text-gray-700 text-base">TOTAL:</td>
                                <td id="ticketTotal" class="p-3 text-right font-black text-unicafe-botones text-lg"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[10000]"></div>
    
    <div id="footer-dynamic"></div> 
    <footer-component></footer-component>
    
    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
    <script src="./js/mis_pedidos.js"></script>
</body>
</html>
