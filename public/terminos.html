<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Términos y Condiciones – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>
<body class="bg-unicafe-body text-[#1f1f1f] min-h-screen flex flex-col font-sans">

    <div class="app flex-1 flex flex-col">
        <header class="relative z-[2000] bg-unicafe-header text-white flex justify-between items-center p-4 shadow-md">
            <span class="font-bold text-lg">Cafetería UTHH</span>
        </header>

        <main class="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">
            
            <h2 class="text-center text-unicafe-header text-4xl font-bold mb-10 uppercase tracking-wide">
                Términos y Condiciones de Uso
            </h2>

            <div class="max-w-5xl mx-auto">
                <div id="termsGrid" class="grid grid-cols-1 gap-6">
                    
                    <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-[#2A9D8F] transition-transform hover:-translate-y-1 hover:shadow-md">
                        <div class="text-xl font-extrabold text-[#2d2d2d] mb-3 uppercase">
                            Título del Término
                        </div>
                        <div class="text-base text-[#555] leading-relaxed text-justify">
                            Aquí se cargará la descripción del término traída desde la base de datos mediante JavaScript.
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <footer class="p-4 bg-white border-t border-[#bfa88a] text-center text-sm text-gray-500">
            &copy; 2026 Cafetería UTHH - Todos los derechos reservados.
        </footer>
    </div>
</body>
</html>
