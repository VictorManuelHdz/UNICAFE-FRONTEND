<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Somos – Cafetería UTHH</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'unicafe-header': '#7d5d36', 
            'unicafe-botones': '#2A9D8F',
            'unicafe-body': '#fdfbf7',
          }
        }
      }
    }
</script>
</head>

<body class="bg-unicafe-body min-h-screen font-sans text-[#1f1f1f]">

<header class="bg-unicafe-header text-white p-4 shadow-md">
    <h1 class="font-bold text-lg">Cafetería UTHH</h1>
</header>

<main class="max-w-6xl mx-auto p-6">

    <div class="text-center mb-6">
        <button id="btnToggle"
            class="bg-[#c59b42] text-white px-6 py-2 rounded-lg font-bold hover:brightness-90 transition shadow">
            Agregar Nueva Sección
        </button>
    </div>

    <div id="formulario"
        class="hidden bg-white border border-[#bfa88a] rounded-xl shadow-sm p-8 mb-10 transition">

        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h3 class="text-2xl font-bold text-unicafe-header">
                Agregar Nueva Sección
            </h3>

            <a href="index.php"
               class="bg-unicafe-botones text-white px-6 py-2 rounded-lg font-semibold hover:brightness-90 transition shadow flex items-center gap-2">
                Ver como Usuario
            </a>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block font-semibold mb-2 text-unicafe-header">
                    Descripción / Historia
                </label>
                <textarea rows="4"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                    placeholder="Escribe aquí el texto..."></textarea>
            </div>

            <div>
                <label class="block font-semibold mb-2 text-unicafe-header">
                    Imagen de la sección
                </label>

                <img id="previewImage"
                    src="https://placehold.co/80x80?text=Imagen"
                    class="w-20 h-20 object-cover rounded-md border mb-4">

                <input type="file"
                    id="imagen"
                    accept="image/*"
                    class="block w-full text-sm text-gray-600
                           file:mr-4 file:py-2 file:px-4
                           file:rounded-lg file:border-0
                           file:text-sm file:font-bold
                           file:bg-unicafe-botones file:text-white
                           hover:file:brightness-90 transition">
            </div>

            <div>
                <button
                    class="bg-unicafe-botones text-white px-6 py-2 rounded-lg font-bold hover:brightness-90 transition shadow">
                    Agregar Sección
                </button>
            </div>
        </div>
    </div>

    <div id="contenedorTabla" class="bg-white border border-[#bfa88a] rounded-xl shadow-sm p-6">

        <h3 class="text-xl font-bold text-unicafe-header mb-6">
            Secciones Actuales
        </h3>

        <div class="overflow-x-auto">
            <table class="w-full text-center border-collapse">
                <thead>
                    <tr class="bg-unicafe-header text-white">
                        <th class="p-3">Imagen</th>
                        <th class="p-3">Descripción</th>
                        <th class="p-3">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4">
                            <img src="https://placehold.co/60x60"
                                class="w-14 h-14 object-cover rounded-md mx-auto">
                        </td>
                        <td class="p-4 text-left text-sm">
                            Somos una cafetería comprometida con la calidad
                            y el mejor servicio para nuestros clientes.
                        </td>
                        <td class="p-4 space-x-3 whitespace-nowrap">
                            <button class="text-blue-600 font-bold hover:underline transition-colors">Editar</button>
                            <button class="text-red-600 font-bold hover:underline transition-colors">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script>
const btn = document.getElementById('btnToggle');
const form = document.getElementById('formulario');
const tabla = document.getElementById('contenedorTabla');

btn.addEventListener('click', () => {
    const isFormHidden = form.classList.toggle('hidden');
    if(isFormHidden){
        tabla.classList.remove('hidden');
        btn.textContent = "Agregar Nueva Sección";
    } else {
        tabla.classList.add('hidden');
        btn.textContent = "Ocultar Formulario";
    }
});
</script>

</body>
</html>
