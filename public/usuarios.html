<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Usuarios — Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <main class="flex-1 w-full p-4 md:p-8">

        <div class="flex justify-center mb-6">
            <button id="btnToggleFormulario"
                class="bg-unicafe-accent hover:bg-unicafe-accent-hover text-white py-2.5 px-6 rounded-lg font-bold cursor-pointer transition-colors shadow-sm">
                Registrar Nuevo Usuario
            </button>
        </div>

        <div id="contenedorFormulario" class="hidden">
            <div
                class="bg-unicafe-form-bg p-[30px] rounded-lg shadow-[0_4px_6px_rgba(0,0,0,0.1)] max-w-[1100px] mx-auto border border-gray-100">
                <h2 class="text-unicafe-header-dark text-[1.8rem] font-bold mb-6 border-b-2 border-[#e0e0e0] pb-2.5">
                    Registrar Nuevo Usuario</h2>
                <form id="formUsuario" autocomplete="off">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-[30px]">
                        <div class="flex flex-col gap-[15px]">
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Nombre(s)</label>
                                <input type="text" id="nombres" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Apellido
                                    paterno</label>
                                <input type="text" id="apellidoPaterno" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Apellido
                                    materno</label>
                                <input type="text" id="apellidoMaterno" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Teléfono</label>
                                <input type="tel" id="telefono" required maxlength="10"
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div class="flex gap-2.5 mt-4">
                                <button type="submit"
                                    class="bg-unicafe-botones hover:bg-[#21867a] text-white p-3 rounded-md font-bold text-[1rem] flex-1 transition-colors">
                                    Guardar Usuario
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-[15px]">
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Correo</label>
                                <input type="email" id="correo" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Dirección</label>
                                <input type="text" id="direccion" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                            <div>
                                <label class="block font-bold text-[#5a4635] mb-1.5 text-[0.9rem]">Contraseña</label>
                                <input type="password" id="password" required
                                    class="w-full p-2.5 border border-[#ccc] rounded-md text-[1rem] bg-white focus:outline-none focus:border-unicafe-botones focus:ring-2 focus:ring-unicafe-botones/20">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div id="contenedorListado" class="block">
            <div
                class="bg-white p-6 rounded-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] max-w-[1100px] mx-auto border border-gray-100">
                <h2 class="text-unicafe-header-dark text-[1.8rem] font-bold mb-6 border-b-2 border-[#e0e0e0] pb-2.5">
                    Listado de Usuarios</h2>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-unicafe-header-dark text-white">
                                <th class="border border-[#ddd] p-3 text-left font-bold">Nombre Completo</th>
                                <th class="border border-[#ddd] p-3 text-left font-bold">Correo</th>
                                <th class="border border-[#ddd] p-3 text-left font-bold">Rol</th>
                                <th class="border border-[#ddd] p-3 text-left font-bold">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios-body" class="text-[#333]">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-confirmacion" class="fixed inset-0 z-[10000] bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full text-center transform scale-95 transition-transform duration-300" id="modal-confirmacion-caja">
            <div class="text-unicafe-cancel text-5xl mb-4">⚠️</div>
            <h3 class="text-2xl font-black text-gray-800 mb-2">¿Estás seguro?</h3>
            <p class="text-gray-500 mb-8 text-sm" id="modal-confirmacion-mensaje">Esta acción no se puede deshacer.</p>
            <div class="flex gap-3 justify-center">
                <button id="btn-cancelar-accion" class="px-5 py-2.5 rounded-lg bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors w-full">Cancelar</button>
                <button id="btn-confirmar-accion" class="px-5 py-2.5 rounded-lg bg-unicafe-cancel text-white font-bold hover:brightness-110 transition-colors shadow-sm w-full">Sí, eliminar</button>
            </div>
        </div>
    </div>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script type="module" src="./js/usuarios.js"></script>
</body>

</html>
