<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Términos – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-unicafe-body min-h-screen font-sans text-[#1f1f1f] flex flex-col">

    <div class="app flex-1 flex flex-col">
        <header-component></header-component>
        <nav-secundario></nav-secundario>

        <main class="flex-1 max-w-6xl mx-auto p-6 w-full">

            <div class="text-center mb-6">
                <button id="btnToggle"
                    class="bg-unicafe-accent text-white px-6 py-2 rounded-lg font-bold hover:bg-unicafe-accent-hover transition-colors shadow-md">
                    Agregar Nuevo Término
                </button>
            </div>

            <div id="formulario"
                class="hidden bg-white border border-unicafe-border rounded-xl shadow-sm p-8 mb-10 transition-all">

                <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="text-2xl font-bold text-unicafe-header" id="tituloFormulario">
                        Agregar nuevo término
                    </h2>
                    <a href="terminos.html" target="_blank"
                        class="bg-unicafe-botones text-white px-4 py-2 rounded-lg font-bold text-sm hover:brightness-95 transition shadow-sm flex items-center gap-2">
                        <i class="fa-regular fa-eye"></i> Ver como Usuario
                    </a>
                </div>

                <hr class="border-gray-200 mb-8">

                <form id="formTermino" class="space-y-6">
                    <div>
                        <label class="block font-semibold mb-2 text-unicafe-header-dark">Título</label>
                        <input type="text" id="inputTitulo" required
                            class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                            placeholder="Ej: 1. Uso permitido del sistema">
                    </div>

                    <div>
                        <label class="block font-semibold mb-2 text-unicafe-header-dark">Descripción</label>
                        <textarea id="inputContenido" rows="5" required
                            class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition resize-y"
                            placeholder="Escribe el contenido detallado del término..."></textarea>
                    </div>

                    <div class="flex justify-end gap-3 mt-4">
                        <button type="button" onclick="toggleFormulario()"
                            class="bg-unicafe-cancel hover:bg-red-600 text-white px-6 py-2.5 rounded-lg font-bold transition shadow-md">
                            Cancelar
                        </button>
                        <button type="submit" id="btnSubmitTermino"
                            class="bg-unicafe-botones hover:bg-[#21867a] text-white px-8 py-2.5 rounded-lg font-bold transition shadow-md">
                            Guardar Término
                        </button>
                    </div>
                </form>
            </div>

            <div id="contenedorTabla"
                class="bg-white border border-unicafe-border rounded-xl shadow-sm mb-10 p-6 md:p-8">

                <div class="border-b border-gray-200 mb-6 pb-4">
                    <h2 class="text-2xl md:text-3xl font-black text-[#765433]">
                        Listado de Términos
                    </h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-[#765433] text-white">
                                <th class="p-4 text-left font-bold text-sm tracking-wide w-1/4">Título</th>
                                <th class="p-4 text-left font-bold text-sm tracking-wide">Descripción</th>
                                <th class="p-4 text-center font-bold text-sm tracking-wide w-32">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyTerminos" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="3" class="text-center py-8 text-gray-500 font-bold animate-pulse">
                                    Cargando términos...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="../public/componenetes_js/accesibilidad.js"></script>
    <script type="module" src="./js/gestion_terminos.js"></script>
    <script src="../public/js/proteccionRutas.js"></script>
</body>

</html>
