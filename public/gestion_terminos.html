<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Términos – Cafetería UTHH</title>

    <link rel="stylesheet" href="css/output.css">
</head>

<body class="bg-unicafe-body min-h-screen font-sans text-[#1f1f1f]">

    <header-component></header-component>
    <nav-secundario></nav-secundario>

    <main class="max-w-6xl mx-auto p-6">

        <div class="text-center mb-6">
            <button id="btnToggle"
                class="bg-unicafe-accent text-white px-6 py-2 rounded-lg font-bold hover:brightness-95 transition shadow-md">
                Agregar Nuevo Término
            </button>
        </div>

        <div id="formulario"
            class="hidden bg-white border border-unicafe-border rounded-xl shadow-sm p-8 mb-10 transition">

            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-unicafe-header">
                    Agregar nuevo término
                </h2>

                <a href="terminos.php" target="_blank"
                    class="bg-unicafe-botones text-white px-4 py-2 rounded-lg font-bold text-sm hover:brightness-95 transition shadow-sm">
                    Ver como Usuario
                </a>
            </div>

            <hr class="border-gray-200 mb-8">

            <div class="space-y-6">

                <div>
                    <label class="block font-semibold mb-2 text-unicafe-header">
                        Título
                    </label>

                    <input type="text"
                        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                        placeholder="Ej: Uso permitido del sistema">
                </div>

                <div>
                    <label class="block font-semibold mb-2 text-unicafe-header">
                        Descripción
                    </label>

                    <textarea rows="4"
                        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                        placeholder="Escribe el contenido del término..."></textarea>
                </div>

                <div class="text-right">
                    <button
                        class="bg-unicafe-botones text-white px-8 py-2 rounded-lg font-bold hover:brightness-95 transition shadow-md">
                        Guardar Término
                    </button>
                </div>

            </div>
        </div>

    
        <div id="contenedorTabla"
            class="bg-white border border-unicafe-border rounded-xl shadow-sm overflow-hidden">

            <h2 class="text-xl font-bold text-unicafe-header p-6">
                Listado de Términos
            </h2>

            <div class="overflow-x-auto">

                <table class="w-full border-collapse">

                    <thead>
                        <tr class="bg-unicafe-header text-white">
                            <th class="py-4 px-10 text-left font-bold w-1/4">Título</th>
                            <th class="py-4 px-10 text-left font-bold">Descripción</th>
                            <th class="py-4 px-10 text-center font-bold w-32">Acciones</th>
                        </tr>
                    </thead>

                    <tbody class="divide-y divide-gray-200">

                        <tr class="hover:bg-gray-50 transition">

                            <td class="p-6 font-semibold text-gray-800">
                                Uso del Sistema
                            </td>

                            <td class="p-6 text-left text-gray-600 text-sm leading-relaxed">
                                El usuario deberá utilizar la plataforma de manera responsable.
                            </td>

                            <td class="p-6 space-x-3 text-center whitespace-nowrap">

                                <button class="text-blue-600 font-bold hover:underline transition-colors">
                                    Editar
                                </button>

                                <button class="text-red-600 font-bold hover:underline transition-colors">
                                    Eliminar
                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>
        </div>

    </main>

    <script>

        const btn = document.getElementById("btnToggle");
        const form = document.getElementById("formulario");
        const tabla = document.getElementById("contenedorTabla");

        btn.addEventListener("click", () => {

            const isHidden = form.classList.toggle("hidden");

            if (isHidden) {
                tabla.classList.remove("hidden");
                btn.textContent = "Agregar Nuevo Término";
            } else {
                tabla.classList.add("hidden");
                btn.textContent = "Ocultar Formulario";
            }

        });

    </script>
    <script src="../public/componenetes_js/componentes.js"></script>
    <script src="public/componenetes_js/accesibilidad.js"></script>
</body>
</html>
