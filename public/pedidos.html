<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Pedidos-Cafetería UTHH</title> 
    <link rel="stylesheet" href="css/output.css" />
</head>
<body class="bg-unicafe-body text-[#1f1f1f] min-h-screen flex flex-col font-sans">

    <div class="app flex-1 flex flex-col">

        <!-- Header igual que menú -->
        <header class="relative z-[2000] bg-unicafe-header text-white flex justify-between items-center p-4 shadow-md">
            <span class="font-bold text-lg">Cafetería UTHH</span>
        </header>

        <main class="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">

            <h1 class="text-center text-3xl font-bold mb-10 text-unicafe-header">
                MI hISTORIAL DE PEDIDOS
            </h1> 

            <!-- Card contenedora -->
            <section class="bg-white border-2 border-[#bfa88a] rounded-lg shadow-sm p-6 max-w-6xl mx-auto">
                <!-- Tabla responsive -->
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-sm">
                        <thead>
                            <tr class="bg-[#f5f1ea] text-[#1f1f1f]">
                                <th class="p-3 text-left border-b">Pedido</th>
                                <th class="p-3 text-left border-b">Detalle</th>
                                <th class="p-3 text-left border-b">Hora Entrega</th>
                                <th class="p-3 text-center border-b">Artículos</th>
                                <th class="p-3 text-left border-b">Total</th>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- Pedido ejemplo 1 -->
                            <tr class="hover:bg-[#faf7f2] transition-colors">
                                <td class="p-3 border-b">#102</td>
                                <td class="p-3 border-b">Café Americano + Galleta</td>
                                <td class="p-3 border-b">10:30 AM</td>
                                <td class="p-3 border-b text-center">2</td>
                                <td class="p-3 border-b font-bold text-[#2A9D8F]">$58.00</td>
                            </tr>

                            <!-- Pedido ejemplo 2 -->
                            <tr class="hover:bg-[#faf7f2] transition-colors">
                                <td class="p-3 border-b">#101</td>
                                <td class="p-3 border-b">Capuchino Vainilla</td>
                                <td class="p-3 border-b">09:15 AM</td>
                                <td class="p-3 border-b text-center">1</td>
                                <td class="p-3 border-b font-bold text-[#2A9D8F]">$45.00</td>
                            </tr>

                        </tbody>

                    </table>
                </div>

            </section>

        </main>
    </div>

</body>
</html>
