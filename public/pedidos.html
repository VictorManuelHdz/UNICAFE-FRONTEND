<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Pedidos-Cafetería UTHH</title> 
    <link rel="stylesheet" href="css/output.css" />
    

</head>
<body class="bg-unicafe-body text-current min-h-screen flex flex-col font-sans">
        <header>
            <div class="w-full bg-unicafe-header text-white p-4 md:p-6 flex justify-center items-center shadow-md">
                <h1 class="m-0 text-xl md:text-3xl font-[800] tracking-wider uppercase">CAFETERIA UTHH</h1>
            </div>
        </header>
    <div class="app flex-1 flex flex-col">
        <main class="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">

            <section class="bg-white rounded-lg shadow-sm p-8 max-w-6xl mx-auto">
                
                <h2 class="text-2xl font-bold text-[#444] mb-8">Historial General de Pedidos</h2>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-[#f9f9f9] text-[#777] uppercase text-xs tracking-wider">
                                <th class="p-4 text-left border-b border-gray-100">Id</th>
                                <th class="p-4 text-left border-b border-gray-100">Cliente</th>
                                <th class="p-4 text-left border-b border-gray-100">Detalle</th>
                                <th class="p-4 text-left border-b border-gray-100">Hora Entrega</th>
                                <th class="p-4 text-left border-b border-gray-100">Total</th>
                                <th class="p-4 text-center border-b border-gray-100">Acciones</th>
                            </tr>
                        </thead>

                        <tbody class="text-sm">
                            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                                <td class="p-4 text-gray-600">8</td>
                                <td class="p-4 font-bold text-gray-800">Juan</td>
                                <td class="p-4 text-gray-600">1x Capuchino</td>
                                <td class="p-4 text-gray-600">09:00:00</td>
                                <td class="p-4 text-gray-600">$45.00</td>
                                <td class="p-4 text-center">
                                    <button class="bg-red-600 text-white w-8 h-8 rounded-md font-bold hover:bg-red-700 transition-colors">X</button>
                                </td>
                            </tr>

                            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                                <td class="p-4 text-gray-600">7</td>
                                <td class="p-4 font-bold text-gray-800">Pancho Francisco</td>
                                <td class="p-4 text-gray-600">2x Tortas de Pastor</td>
                                <td class="p-4 text-gray-600">02:15:00</td>
                                <td class="p-4 text-gray-600">$120.00</td>
                                <td class="p-4 text-center">
                                    <button class="bg-red-600 text-white w-8 h-8 rounded-md font-bold hover:bg-red-700 transition-colors">X</button>
                                </td>
                            </tr>

                            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                                <td class="p-4 text-gray-600">6</td>
                                <td class="p-4 font-bold text-gray-800">Pancho Francisco</td>
                                <td class="p-4 text-gray-600">1x Café Americano, 1x Donas</td>
                                <td class="p-4 text-gray-600">10:30:00</td>
                                <td class="p-4 text-gray-600">$65.00</td>
                                <td class="p-4 text-center">
                                    <button class="bg-red-600 text-white w-8 h-8 rounded-md font-bold hover:bg-red-700 transition-colors">X</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <div id="footer-dynamic"></div>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-dynamic').innerHTML = html;
                // Cargar scripts de lógica después
                ['archivosJS/lector_voz.js', 'archivosJS/accesibilidad.js'].forEach(src => {
                    const s = document.createElement('script');
                    s.src = src;
                    document.body.appendChild(s);
                });
            });
    </script>

</body>
</html>
